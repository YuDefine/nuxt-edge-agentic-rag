# Advanced CI Workflow (GitHub Flow 嚴謹版)
# 適合團隊 / 生產專案：PR gate + path filter + concurrency + CI→E2E workflow_run 鏈
name: CI

on:
  pull_request:
    paths:
      - 'app/**'
      - 'server/**'
      - 'shared/**'
      - 'layers/**'
      - 'build/**'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-ci-gate.mjs'
      - 'scripts/check-deploy-health.mjs'
      - 'scripts/render-staging-wrangler.mjs'
      - 'server/database/migrations/**'
      - 'test/unit/ci-gate.test.ts'
      - 'test/unit/deploy-health-check.test.ts'
      - 'test/integration/migration-stack-fresh-db.spec.ts'
      - 'r2-cors.json'
      - 'wrangler.staging.jsonc'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'server/**'
      - 'shared/**'
      - 'layers/**'
      - 'build/**'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-ci-gate.mjs'
      - 'scripts/check-deploy-health.mjs'
      - 'scripts/render-staging-wrangler.mjs'
      - 'server/database/migrations/**'
      - 'test/unit/ci-gate.test.ts'
      - 'test/unit/deploy-health-check.test.ts'
      - 'test/integration/migration-stack-fresh-db.spec.ts'
      - 'r2-cors.json'
      - 'wrangler.staging.jsonc'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format / Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
