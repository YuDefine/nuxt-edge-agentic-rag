# Advanced CI Workflow (GitHub Flow 嚴謹版)
# 適合團隊 / 生產專案：PR gate + path filter + concurrency + CI→E2E workflow_run 鏈
name: CI

on:
  pull_request:
    paths:
      - 'app/**'
      - 'server/**'
      - 'shared/**'
      - 'layers/**'
      - 'build/**'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-ci-gate.mjs'
      - 'scripts/check-deploy-health.mjs'
      - 'scripts/render-staging-wrangler.mjs'
      - 'server/database/migrations/**'
      - 'test/unit/ci-gate.test.ts'
      - 'test/unit/deploy-health-check.test.ts'
      - 'test/integration/migration-stack-fresh-db.spec.ts'
      - 'r2-cors.json'
      - 'wrangler.staging.jsonc'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  # 刻意不加 paths filter：deploy.yml 的 verify-ci-gate 要求每個 main SHA
  # 必須有對應成功的 CI run，加回 paths 會讓 docs/openspec-only commit 撐爆 gate。
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format / Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        env:
          BETTER_AUTH_SECRET: test-better-auth-secret-at-least-32-chars
          NUXT_SESSION_PASSWORD: test-session-password-at-least-32-chars
        run: pnpm test
