# Advanced CI Workflow (GitHub Flow 嚴謹版)
# 適合團隊 / 生產專案：PR gate + path filter + concurrency + CI→E2E workflow_run 鏈
name: CI

on:
  pull_request:
    paths:
      - "app/**"
      - "server/**"
      - "shared/**"
      - "layers/**"
      - "nuxt.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "server/**"
      - "shared/**"
      - "layers/**"
      - "nuxt.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format / Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Vite+ (vp)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Format check
        run: vp run format:check

      - name: Lint
        run: vp run lint

      - name: Typecheck
        run: vp run typecheck

      - name: Unit tests
        run: vp run test
