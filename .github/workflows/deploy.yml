# Deploy workflow for nuxt-edge-agentic-rag
#
# 對應 docs/verify/DEPLOYMENT_RUNBOOK.md 與報告附錄 D-2。
#
# 與既有 deploy.yml 的差異：
#   1. 新增 workflow_dispatch inputs.target（production / staging）
#   2. 新增 D1 migrations apply step（部署 code 前先 apply schema）
#   3. 拆分 `deploy-production` / `deploy-staging` 兩個 job
#   4. runtime secrets 由 Cloudflare Worker secret store 預先管理，GitHub Actions
#      只負責 build + deploy，不在每次部署時同步覆寫 secrets
#   5. 所有 build-time site URL secrets 補上 PROD_ / STAGING_ prefix，避免跨環境覆寫
#
# 觸發策略：
#   - push tag v*       → production deploy（透過 needs: ci）
#   - workflow_dispatch → 可選 production 或 staging
#
# STAGING 區塊為 illustrative — 若尚未建立 staging 環境，可將 `deploy-staging`
# job 保留為註解或維持 `if: false` 避免觸發失敗。啟用步驟見
# docs/verify/DEPLOYMENT_RUNBOOK.md §2.6（Staging 環境）。
name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # CI gate — 所有 deploy target 前置條件
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # PRODUCTION deploy — 由 tag push 或 workflow_dispatch(target=production) 觸發
  # ---------------------------------------------------------------------------
  deploy-production:
    needs: ci
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    outputs:
      deployment_url: ${{ steps.deploy_production.outputs.deployment-url }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # D1 migrations 必須 deploy code 之前 apply，否則新 code 會命中舊 schema
      # 報錯 D1_ERROR: no such column。若 migration 已是最新，wrangler 會印
      # 「No migrations to apply」並以 exit 0 結束，不影響 pipeline。
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply agentic-rag-db --remote

      - name: Build
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.PROD_BETTER_AUTH_SECRET || 'build-only-prod-better-auth-secret-32chars' }}
          NODE_OPTIONS: --max-old-space-size=4096
          NUXT_SESSION_PASSWORD: ${{ secrets.PROD_NUXT_SESSION_PASSWORD || 'build-only-prod-session-password-32chars' }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_SITE_URL: ${{ secrets.PROD_SITE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy to Cloudflare Workers (production)
        id: deploy_production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .output
          command: deploy

  # ---------------------------------------------------------------------------
  # STAGING deploy — illustrative
  # ---------------------------------------------------------------------------
  # 啟用前提（見 docs/verify/DEPLOYMENT_RUNBOOK.md §2.6）：
  #   1. 已建立 staging D1/R2/KV 資源（各加 -staging 後綴）
  #   2. 已建立 wrangler.staging.jsonc 或以 --env staging 區分
  #   3. GitHub 已設定 STAGING_* prefix 的 secrets
  deploy-staging:
    needs: ci
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    outputs:
      deployment_url: ${{ steps.deploy_staging.outputs.deployment-url }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 注意 database name 為 staging 專用；視 wrangler 設定採 --env staging
          # 或 --config wrangler.staging.jsonc 其一
          command: d1 migrations apply agentic-rag-db-staging --remote --config wrangler.staging.jsonc

      - name: Build (staging)
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.STAGING_BETTER_AUTH_SECRET || 'build-only-staging-better-auth-secret-32chars' }}
          NODE_OPTIONS: --max-old-space-size=4096
          NUXT_SESSION_PASSWORD: ${{ secrets.STAGING_NUXT_SESSION_PASSWORD || 'build-only-staging-session-password-32chars' }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_SITE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Render staging wrangler config
        run: node scripts/render-staging-wrangler.mjs

      - name: Deploy to Cloudflare Workers (staging)
        id: deploy_staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .output
          command: deploy --config server/wrangler.staging.json

  # ---------------------------------------------------------------------------
  # Smoke test — 部署後 health check
  # ---------------------------------------------------------------------------
  smoke-test:
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ secrets.PROD_SITE_URL }}
      DEPLOYMENT_URL: ${{ needs.deploy-production.outputs.deployment_url }}
    steps:
      - name: Health check
        run: |
          check_url() {
            local label="$1"
            local url="$2"
            local attempts="$3"

            if [ -z "$url" ]; then
              echo "::warning::$label URL is empty; skip health check target"
              return 2
            fi

            for attempt in $(seq 1 "$attempts"); do
              STATUS=$(curl -sS -L -A "$BROWSER_USER_AGENT" -o /dev/null -w '%{http_code}' "$url" --max-time 15 || true)
              if [ "$STATUS" = "200" ]; then
                echo "$label healthy (HTTP $STATUS) on attempt $attempt"
                return 0
              fi

              echo "$label attempt $attempt: HTTP ${STATUS:-000}"

              if [ "$STATUS" = "403" ]; then
                echo "::warning::$label returned 403 from GitHub runner; likely blocked by Cloudflare WAF/Bot protection"
                return 3
              fi

              sleep 10
            done

            return 1
          }

          if check_url "Custom domain" "$CUSTOM_DOMAIN_URL" 6; then
            exit 0
          else
            CUSTOM_DOMAIN_RESULT=$?
          fi

          if [ "$CUSTOM_DOMAIN_RESULT" = "3" ] && [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_URL" != "$CUSTOM_DOMAIN_URL" ]; then
            echo "Fallback to deployment URL: $DEPLOYMENT_URL"
            if check_url "Deployment URL" "$DEPLOYMENT_URL" 6; then
              exit 0
            else
              DEPLOYMENT_RESULT=$?
            fi
          fi

          echo "::error::Health check failed (custom domain result=$CUSTOM_DOMAIN_RESULT, deployment url=${DEPLOYMENT_URL:-<empty>})"
          exit 1

  smoke-test-staging:
    needs: [deploy-staging]
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ secrets.STAGING_SITE_URL }}
      DEPLOYMENT_URL: ${{ needs.deploy-staging.outputs.deployment_url }}
    steps:
      - name: Health check
        run: |
          check_url() {
            local label="$1"
            local url="$2"
            local attempts="$3"

            if [ -z "$url" ]; then
              echo "::warning::$label URL is empty; skip health check target"
              return 2
            fi

            for attempt in $(seq 1 "$attempts"); do
              STATUS=$(curl -sS -L -A "$BROWSER_USER_AGENT" -o /dev/null -w '%{http_code}' "$url" --max-time 15 || true)
              if [ "$STATUS" = "200" ]; then
                echo "$label healthy (HTTP $STATUS) on attempt $attempt"
                return 0
              fi

              echo "$label attempt $attempt: HTTP ${STATUS:-000}"

              if [ "$STATUS" = "403" ]; then
                echo "::warning::$label returned 403 from GitHub runner; likely blocked by Cloudflare WAF/Bot protection"
                return 3
              fi

              sleep 10
            done

            return 1
          }

          if check_url "Custom domain" "$CUSTOM_DOMAIN_URL" 6; then
            exit 0
          else
            CUSTOM_DOMAIN_RESULT=$?
          fi

          if [ "$CUSTOM_DOMAIN_RESULT" = "3" ] && [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_URL" != "$CUSTOM_DOMAIN_URL" ]; then
            echo "Fallback to deployment URL: $DEPLOYMENT_URL"
            if check_url "Deployment URL" "$DEPLOYMENT_URL" 6; then
              exit 0
            else
              DEPLOYMENT_RESULT=$?
            fi
          fi

          echo "::error::Health check failed (custom domain result=$CUSTOM_DOMAIN_RESULT, deployment url=${DEPLOYMENT_URL:-<empty>})"
          exit 1

  # ---------------------------------------------------------------------------
  # Notify — Discord webhook（失敗時通知 stakeholders）
  # ---------------------------------------------------------------------------
  notify:
    if: always()
    needs: [ci, deploy-production, smoke-test, deploy-staging, smoke-test-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Notify Discord
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'production' }}
          CI_RESULT: ${{ needs.ci.result }}
          PROD_DEPLOY_RESULT: ${{ needs.deploy-production.result }}
          PROD_SMOKE_RESULT: ${{ needs.smoke-test.result }}
          STAGING_DEPLOY_RESULT: ${{ needs.deploy-staging.result }}
          STAGING_SMOKE_RESULT: ${{ needs.smoke-test-staging.result }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [ "$TARGET" = "staging" ]; then
            DEPLOY_RESULT="$STAGING_DEPLOY_RESULT"
            SMOKE_RESULT="$STAGING_SMOKE_RESULT"
          else
            DEPLOY_RESULT="$PROD_DEPLOY_RESULT"
            SMOKE_RESULT="$PROD_SMOKE_RESULT"
          fi

          if [ "$CI_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ] && [ "$SMOKE_RESULT" = "success" ]; then
            COLOR=3066993; STATUS="Deploy succeeded (${TARGET}) — ${TAG}"
          else
            COLOR=15158332; STATUS="Deploy failed (${TARGET}) — ${TAG}"
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg title "${STATUS}" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg footer "$GITHUB_REPOSITORY" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ embeds: [{ title: $title, url: $url, color: $color, footer: { text: $footer }, timestamp: $ts }] }')

          curl -sf -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" || true
