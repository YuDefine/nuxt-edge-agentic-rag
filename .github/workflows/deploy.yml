# Deploy workflow for nuxt-edge-agentic-rag
#
# 對應 docs/verify/DEPLOYMENT_RUNBOOK.md 與報告附錄 D-2。
#
# 與既有 deploy.yml 的差異：
#   1. 新增 workflow_dispatch inputs.target（production / staging）
#   2. 新增 D1 migrations apply step（部署 code 前先 apply schema）
#   3. 拆分 `deploy-production` / `deploy-staging` 兩個 job
#   4. runtime secrets 由 Cloudflare Worker secret store 預先管理，GitHub Actions
#      只負責 build + deploy，不在每次部署時同步覆寫 secrets
#   5. 所有 build-time site URL secrets 補上 PROD_ / STAGING_ prefix，避免跨環境覆寫
#
# 觸發策略：
#   - push tag v*       → production deploy（先驗證同 SHA 已有成功的 CI run）
#   - workflow_dispatch → 可選 production 或 staging（同上，不重跑 CI）
#
# STAGING 區塊為 illustrative — 若尚未建立 staging 環境，可將 `deploy-staging`
# job 保留為註解或維持 `if: false` 避免觸發失敗。啟用步驟見
# docs/verify/DEPLOYMENT_RUNBOOK.md §2.6（Staging 環境）。
name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # CI gate — 驗證同一個 SHA 已經有成功的 CI workflow，不重跑整套檢查
  # ---------------------------------------------------------------------------
  verify-ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify successful CI run exists for this SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-ci-gate.mjs

  # ---------------------------------------------------------------------------
  # PRODUCTION deploy — 由 tag push 或 workflow_dispatch(target=production) 觸發
  # ---------------------------------------------------------------------------
  deploy-production:
    needs: verify-ci-gate
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    outputs:
      deployment_url: ${{ steps.deploy_production.outputs.deployment-url }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # D1 migrations 必須 deploy code 之前 apply，否則新 code 會命中舊 schema
      # 報錯 D1_ERROR: no such column。若 migration 已是最新，wrangler 會印
      # 「No migrations to apply」並以 exit 0 結束，不影響 pipeline。
      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply agentic-rag-db --remote

      - name: Build
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.PROD_BETTER_AUTH_SECRET || 'build-only-prod-better-auth-secret-32chars' }}
          NODE_OPTIONS: --max-old-space-size=4096
          # `nuxt.config.ts` reads these at build time for both the public
          # passkey UI gate and the server auth plugin registration. If they
          # are omitted here, the built artifact silently compiles passkey as
          # disabled (`false`) even though runtime wrangler vars say `true`.
          NUXT_KNOWLEDGE_AI_GATEWAY_CACHE_ENABLED: 'true'
          NUXT_KNOWLEDGE_AI_GATEWAY_ID: agentic-rag-production
          NUXT_KNOWLEDGE_AI_SEARCH_INDEX: agentic-rag
          NUXT_KNOWLEDGE_D1_DATABASE: DB
          NUXT_KNOWLEDGE_DOCUMENTS_BUCKET: BLOB
          NUXT_KNOWLEDGE_ENVIRONMENT: production
          NUXT_KNOWLEDGE_MCP_CONNECTOR_CLIENTS_JSON: ${{ vars['PROD_MCP_CONNECTOR_CLIENTS_JSON'] || secrets.PROD_MCP_CONNECTOR_CLIENTS_JSON }}
          NUXT_KNOWLEDGE_FEATURE_PASSKEY: 'true'
          NUXT_KNOWLEDGE_RATE_LIMIT_KV: KV
          NUXT_SESSION_PASSWORD: ${{ secrets.PROD_NUXT_SESSION_PASSWORD || 'build-only-prod-session-password-32chars' }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_SITE_URL: ${{ secrets.PROD_SITE_URL }}
          NUXT_PASSKEY_RP_ID: yudefine.com.tw
          NUXT_PASSKEY_RP_NAME: 知識問答系統
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy to Cloudflare Workers (production)
        id: deploy_production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .output
          command: deploy

  # ---------------------------------------------------------------------------
  # STAGING deploy — illustrative
  # ---------------------------------------------------------------------------
  # 啟用前提（見 docs/verify/DEPLOYMENT_RUNBOOK.md §2.6）：
  #   1. 已建立 staging D1/R2/KV 資源（各加 -staging 後綴）
  #   2. 已建立 wrangler.staging.jsonc 或以 --env staging 區分
  #   3. GitHub 已設定 STAGING_* prefix 的 secrets
  deploy-staging:
    needs: verify-ci-gate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    outputs:
      deployment_url: ${{ steps.deploy_staging.outputs.deployment-url }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # staging 曾出現 migration ledger 已標記 bootstrap 完成、但實際 auth
          # base tables 缺失的歷史狀態；先以 idempotent bootstrap SQL 補齊底表，
          # 再套用後續 migrations，避免 0002 直接撞到 `no such table: user`。
          command: d1 execute agentic-rag-db-staging --remote --config wrangler.staging.jsonc --file server/database/migrations/0001_bootstrap_v1_core.sql

      - name: Apply staged migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 注意 database name 為 staging 專用；視 wrangler 設定採 --env staging
          # 或 --config wrangler.staging.jsonc 其一
          command: d1 migrations apply agentic-rag-db-staging --remote --config wrangler.staging.jsonc

      - name: Build (staging)
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.STAGING_BETTER_AUTH_SECRET || 'build-only-staging-better-auth-secret-32chars' }}
          NODE_OPTIONS: --max-old-space-size=4096
          # Keep staging's compiled config aligned with `wrangler.staging.jsonc`
          # so passkey routes and UI flags do not drift from runtime intent.
          NUXT_KNOWLEDGE_AI_GATEWAY_CACHE_ENABLED: 'false'
          NUXT_KNOWLEDGE_AI_GATEWAY_ID: agentic-rag-staging
          NUXT_KNOWLEDGE_AI_SEARCH_INDEX: agentic-rag-staging
          NUXT_KNOWLEDGE_D1_DATABASE: DB
          NUXT_KNOWLEDGE_DOCUMENTS_BUCKET: BLOB
          NUXT_KNOWLEDGE_ENVIRONMENT: staging
          NUXT_KNOWLEDGE_MCP_CONNECTOR_CLIENTS_JSON: ${{ vars['STAGING_MCP_CONNECTOR_CLIENTS_JSON'] || secrets.STAGING_MCP_CONNECTOR_CLIENTS_JSON }}
          NUXT_KNOWLEDGE_FEATURE_PASSKEY: 'true'
          NUXT_KNOWLEDGE_RATE_LIMIT_KV: KV
          NUXT_SESSION_PASSWORD: ${{ secrets.STAGING_NUXT_SESSION_PASSWORD || 'build-only-staging-session-password-32chars' }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_SITE_URL }}
          NUXT_PASSKEY_RP_ID: yudefine.com.tw
          NUXT_PASSKEY_RP_NAME: 知識問答系統
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Render staging wrangler config
        run: node scripts/render-staging-wrangler.mjs

      - name: Deploy to Cloudflare Workers (staging)
        id: deploy_staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .output
          command: deploy --config server/wrangler.staging.json

  # ---------------------------------------------------------------------------
  # DOCS deploy — 與 app deploy 共用同一條 deploy workflow
  # ---------------------------------------------------------------------------
  deploy-docs-production:
    needs: verify-ci-gate
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: deploy-docs-production
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DOCS_CF_PAGES_PROJECT_NAME: ${{ vars['DOCS_CF_PAGES_PROJECT_NAME'] }}
      DOCS_CF_PAGES_PRODUCTION_BRANCH: ${{ vars['DOCS_CF_PAGES_PRODUCTION_BRANCH'] || 'main' }}
      DOCS_CF_ZONE_NAME: ${{ vars['DOCS_CF_ZONE_NAME'] }}
      DOCS_PRODUCTION_URL: ${{ vars['DOCS_PRODUCTION_URL'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare Pages configuration
        run: |
          if [ -z "$DOCS_CF_PAGES_PROJECT_NAME" ]; then
            echo "::error::Missing repository variable DOCS_CF_PAGES_PROJECT_NAME"
            exit 1
          fi

          if [ -n "$DOCS_PRODUCTION_URL" ] && [ -z "$DOCS_CF_ZONE_NAME" ]; then
            echo "::error::Missing repository variable DOCS_CF_ZONE_NAME"
            exit 1
          fi

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy docs to Cloudflare Pages (production)
        run: pnpm exec wrangler pages deploy docs/.vitepress/dist --project-name "$DOCS_CF_PAGES_PROJECT_NAME" --branch "$DOCS_CF_PAGES_PRODUCTION_BRANCH"

      - name: Sync production docs custom domain
        if: env.DOCS_PRODUCTION_URL != ''
        env:
          DOCS_DOMAIN_SYNC_TARGET: production
          DOCS_STAGING_URL: ''
        run: node scripts/sync-docs-pages-domains.mjs

  deploy-docs-staging:
    needs: verify-ci-gate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    concurrency:
      group: deploy-docs-staging
      cancel-in-progress: true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DOCS_CF_PAGES_PROJECT_NAME: ${{ vars['DOCS_CF_PAGES_PROJECT_NAME'] }}
      DOCS_CF_PAGES_STAGING_BRANCH: ${{ vars['DOCS_CF_PAGES_STAGING_BRANCH'] || 'staging' }}
      DOCS_CF_ZONE_NAME: ${{ vars['DOCS_CF_ZONE_NAME'] }}
      DOCS_STAGING_URL: ${{ vars['DOCS_STAGING_URL'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare Pages configuration
        run: |
          if [ -z "$DOCS_CF_PAGES_PROJECT_NAME" ]; then
            echo "::error::Missing repository variable DOCS_CF_PAGES_PROJECT_NAME"
            exit 1
          fi

          if [ -n "$DOCS_STAGING_URL" ] && [ -z "$DOCS_CF_ZONE_NAME" ]; then
            echo "::error::Missing repository variable DOCS_CF_ZONE_NAME"
            exit 1
          fi

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy docs to Cloudflare Pages (staging)
        run: pnpm exec wrangler pages deploy docs/.vitepress/dist --project-name "$DOCS_CF_PAGES_PROJECT_NAME" --branch "$DOCS_CF_PAGES_STAGING_BRANCH"

      - name: Sync staging docs custom domain
        if: env.DOCS_STAGING_URL != ''
        env:
          DOCS_DOMAIN_SYNC_TARGET: staging
          DOCS_PRODUCTION_URL: ''
        run: node scripts/sync-docs-pages-domains.mjs

  # ---------------------------------------------------------------------------
  # Smoke test — 部署後 health check
  # ---------------------------------------------------------------------------
  smoke-test:
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ secrets.PROD_SITE_URL }}
      DEPLOYMENT_URL: ${{ needs.deploy-production.outputs.deployment_url }}
      HEALTH_CHECK_ACCEPT_WAF_BLOCK: true
      HEALTH_CHECK_ATTEMPTS: 6
      HEALTH_CHECK_DELAY_MS: 10000
      HEALTH_CHECK_MAX_TIME_MS: 15000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Health check
        run: node scripts/check-deploy-health.mjs

  smoke-test-staging:
    needs: [deploy-staging]
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ secrets.STAGING_SITE_URL }}
      DEPLOYMENT_URL: ${{ needs.deploy-staging.outputs.deployment_url }}
      HEALTH_CHECK_ACCEPT_WAF_BLOCK: true
      HEALTH_CHECK_ATTEMPTS: 6
      HEALTH_CHECK_DELAY_MS: 10000
      HEALTH_CHECK_MAX_TIME_MS: 15000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Health check
        run: node scripts/check-deploy-health.mjs

  smoke-test-docs-production:
    needs: [deploy-docs-production]
    if: always() && needs.deploy-docs-production.result == 'success' && vars['DOCS_PRODUCTION_URL'] != ''
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ vars['DOCS_PRODUCTION_URL'] }}
      DEPLOYMENT_URL: https://${{ vars['DOCS_CF_PAGES_PROJECT_NAME'] }}.pages.dev
      HEALTH_CHECK_ACCEPT_WAF_BLOCK: true
      HEALTH_CHECK_ATTEMPTS: 3
      HEALTH_CHECK_DELAY_MS: 5000
      HEALTH_CHECK_MAX_TIME_MS: 15000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Health check
        run: node scripts/check-deploy-health.mjs

  smoke-test-docs-staging:
    needs: [deploy-docs-staging]
    if: always() && needs.deploy-docs-staging.result == 'success' && vars['DOCS_STAGING_URL'] != ''
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      BROWSER_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
      CUSTOM_DOMAIN_URL: ${{ vars['DOCS_STAGING_URL'] }}
      DEPLOYMENT_URL: https://${{ vars['DOCS_CF_PAGES_STAGING_BRANCH'] || 'staging' }}.${{ vars['DOCS_CF_PAGES_PROJECT_NAME'] }}.pages.dev
      HEALTH_CHECK_ACCEPT_WAF_BLOCK: true
      HEALTH_CHECK_ATTEMPTS: 3
      HEALTH_CHECK_DELAY_MS: 5000
      HEALTH_CHECK_MAX_TIME_MS: 15000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Health check
        run: node scripts/check-deploy-health.mjs

  # ---------------------------------------------------------------------------
  # Notify — Discord webhook（失敗時通知 stakeholders）
  # ---------------------------------------------------------------------------
  notify:
    if: always()
    needs:
      [
        verify-ci-gate,
        deploy-production,
        smoke-test,
        deploy-staging,
        smoke-test-staging,
        deploy-docs-production,
        smoke-test-docs-production,
        deploy-docs-staging,
        smoke-test-docs-staging,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Notify Discord
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'production' }}
          CI_RESULT: ${{ needs.verify-ci-gate.result }}
          PROD_DEPLOY_RESULT: ${{ needs.deploy-production.result }}
          PROD_SMOKE_RESULT: ${{ needs.smoke-test.result }}
          PROD_DOCS_DEPLOY_RESULT: ${{ needs.deploy-docs-production.result }}
          PROD_DOCS_SMOKE_RESULT: ${{ needs.smoke-test-docs-production.result }}
          STAGING_DEPLOY_RESULT: ${{ needs.deploy-staging.result }}
          STAGING_SMOKE_RESULT: ${{ needs.smoke-test-staging.result }}
          STAGING_DOCS_DEPLOY_RESULT: ${{ needs.deploy-docs-staging.result }}
          STAGING_DOCS_SMOKE_RESULT: ${{ needs.smoke-test-docs-staging.result }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [ "$TARGET" = "staging" ]; then
            DEPLOY_RESULT="$STAGING_DEPLOY_RESULT"
            SMOKE_RESULT="$STAGING_SMOKE_RESULT"
            DOCS_DEPLOY_RESULT="$STAGING_DOCS_DEPLOY_RESULT"
            DOCS_SMOKE_RESULT="$STAGING_DOCS_SMOKE_RESULT"
          else
            DEPLOY_RESULT="$PROD_DEPLOY_RESULT"
            SMOKE_RESULT="$PROD_SMOKE_RESULT"
            DOCS_DEPLOY_RESULT="$PROD_DOCS_DEPLOY_RESULT"
            DOCS_SMOKE_RESULT="$PROD_DOCS_SMOKE_RESULT"
          fi

          if [ "$CI_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ] && [ "$SMOKE_RESULT" = "success" ] && [ "$DOCS_DEPLOY_RESULT" = "success" ] && [ "$DOCS_SMOKE_RESULT" = "success" ]; then
            COLOR=3066993; STATUS="Deploy succeeded (${TARGET}) — ${TAG}"
          else
            COLOR=15158332; STATUS="Deploy failed (${TARGET}) — ${TAG}"
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg title "${STATUS}" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg footer "$GITHUB_REPOSITORY" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ embeds: [{ title: $title, url: $url, color: $color, footer: { text: $footer }, timestamp: $ts }] }')

          curl -sf -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" || true
