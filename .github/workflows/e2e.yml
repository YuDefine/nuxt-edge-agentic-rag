# Advanced E2E Workflow
# 透過 workflow_run 於 CI 成功後觸發，避免 CI 失敗時浪費 runner
name: E2E Tests

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch NuxtHub local DB driver for preview E2E
        run: node scripts/patch-hub-db-dev.mjs

      - name: Bootstrap local sqlite schema for preview E2E
        run: |
          mkdir -p .data/db
          rm -f .data/db/sqlite.db

          for file in $(find server/database/migrations -name '*.sql' | sort); do
            sqlite3 .data/db/sqlite.db < "$file"
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Nuxt
        env:
          ADMIN_EMAIL_ALLOWLIST: admin@test.local
          BETTER_AUTH_SECRET: e2e-better-auth-secret-at-least-32-chars
          NODE_OPTIONS: --max-old-space-size=4096
          NITRO_PRESET: node-server
          NUXT_HUB_LIBSQL_URL: file:.data/db/sqlite.db
          NUXT_KNOWLEDGE_FEATURE_PASSKEY: true
          NUXT_PASSKEY_RP_ID: localhost
          NUXT_PASSKEY_RP_NAME: Agentic E2E
          NUXT_SESSION_PASSWORD: e2e-ci-session-password-at-least-32-chars
        run: pnpm build

      - name: Run E2E tests
        env:
          ADMIN_EMAIL_ALLOWLIST: admin@test.local
          BETTER_AUTH_SECRET: e2e-better-auth-secret-at-least-32-chars
          NUXT_HUB_LIBSQL_URL: file:.data/db/sqlite.db
          NUXT_KNOWLEDGE_FEATURE_PASSKEY: true
          NUXT_PASSKEY_RP_ID: localhost
          NUXT_PASSKEY_RP_NAME: Agentic E2E
          NUXT_SESSION_PASSWORD: e2e-ci-session-password-at-least-32-chars
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
