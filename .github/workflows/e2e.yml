# Advanced E2E Workflow
# 透過 workflow_run 於 CI 成功後觸發，避免 CI 失敗時浪費 runner
name: E2E Tests

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup Vite+ (vp)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Nuxt
        env:
          BETTER_AUTH_SECRET: e2e-better-auth-secret-at-least-32-chars
          NODE_OPTIONS: --max-old-space-size=4096
          NITRO_PRESET: node-server
          NUXT_SESSION_PASSWORD: e2e-ci-session-password-at-least-32-chars
        run: vp run build

      - name: Run E2E tests
        env:
          BETTER_AUTH_SECRET: e2e-better-auth-secret-at-least-32-chars
          NUXT_SESSION_PASSWORD: e2e-ci-session-password-at-least-32-chars
        run: vp run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
